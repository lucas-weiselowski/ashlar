name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify bin/ashlar __version__ matches tag
        run: |
          code_version=$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' bin/ashlar)
          if [ "$code_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag v${{ steps.version.outputs.version }} does not match __version__ ($code_version) in bin/ashlar"
            exit 1
          fi

      - name: Verify CHANGELOG.md has a matching section
        run: python3 .github/scripts/extract_release_notes.py "${{ steps.version.outputs.version }}"

      - name: Verify .claude-plugin/plugin.json version matches tag
        run: |
          plugin_version=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
          if [ "$plugin_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag v${{ steps.version.outputs.version }} does not match version ($plugin_version) in .claude-plugin/plugin.json"
            exit 1
          fi

      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: chmod +x bin/ashlar
      - run: python -m pytest -v

  build-binaries:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: ashlar-linux-x86_64
          - os: macos-latest
            asset_name: ashlar-macos-arm64
          - os: macos-15-intel
            asset_name: ashlar-macos-x86_64
          - os: windows-latest
            asset_name: ashlar-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - run: pip install -r requirements-build.txt
      - run: python -m PyInstaller --onefile --name ashlar bin/ashlar

      - name: Rename build output to the platform asset name
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/ashlar.exe "dist/${{ matrix.asset_name }}"
          else
            mv dist/ashlar "dist/${{ matrix.asset_name }}"
            chmod +x "dist/${{ matrix.asset_name }}"
          fi

      - name: Smoke test the built binary
        shell: bash
        run: |
          set -euo pipefail
          BIN="dist/${{ matrix.asset_name }}"
          export HOME="$RUNNER_TEMP/ashlar-home"
          mkdir -p "$HOME"
          "$BIN" --version
          "$BIN" record --before 1000 --after 100 --label smoke
          "$BIN" report --by-label

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  publish:
    needs: [verify, build-binaries]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist-binaries
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist-binaries
        run: sha256sum ./* > SHA256SUMS

      - name: Extract release notes
        id: notes
        run: |
          python3 .github/scripts/extract_release_notes.py "${{ needs.verify.outputs.version }}" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: v${{ needs.verify.outputs.version }}
          body_path: /tmp/release-notes.md
          generate_release_notes: false
          files: dist-binaries/*
