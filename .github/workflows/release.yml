name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          echo "version=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify bin/ashlar __version__ matches tag
        run: |
          code_version=$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' bin/ashlar)
          if [ "$code_version" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag v${{ steps.version.outputs.version }} does not match __version__ ($code_version) in bin/ashlar"
            exit 1
          fi

      - name: Verify CHANGELOG.md has a matching section
        run: python3 .github/scripts/extract_release_notes.py "${{ steps.version.outputs.version }}"

      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: chmod +x bin/ashlar
      - run: python -m pytest -v

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract release notes
        id: notes
        run: |
          python3 .github/scripts/extract_release_notes.py "${{ needs.verify.outputs.version }}" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: v${{ needs.verify.outputs.version }}
          body_path: /tmp/release-notes.md
          generate_release_notes: false
