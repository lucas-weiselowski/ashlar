name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: chmod +x bin/ashlar
      - run: python -m pytest -v

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
      - name: Exercise the CLI end-to-end
        run: |
          set -euo pipefail
          chmod +x bin/ashlar
          export HOME="$RUNNER_TEMP/ashlar-home"
          mkdir -p "$HOME"

          ./bin/ashlar --version
          ./bin/ashlar record --before 1000 --after 100 --label smoke
          ./bin/ashlar report --by-label

          printf 'a\nb\nc\n' | ./bin/ashlar gavel --key smoke-file --record
          printf 'a\nb\nc\n' | ./bin/ashlar gavel --key smoke-file | grep -q 'unchanged since last read'

          { echo 'ERROR: boom'; seq 1 50 | sed 's/^/debug line /'; } | ./bin/ashlar chisel --record --label smoke-log

  binary-build-smoke:
    # Fast, single-platform proof that PyInstaller can still package bin/ashlar,
    # so a break in the release.yml build-binaries matrix is caught on every PR
    # instead of only discovered when a real vX.Y.Z tag is pushed.
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-build.txt
      - run: pip install -r requirements-build.txt
      - run: python -m PyInstaller --onefile --name ashlar bin/ashlar
      - name: Smoke test the built binary
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/ashlar-home"
          mkdir -p "$HOME"
          ./dist/ashlar --version
          ./dist/ashlar record --before 1000 --after 100 --label smoke
          ./dist/ashlar report --by-label
